<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Juan J. Ortiz - Visual Analytics Specialist" />
    <title>Buzzlite | Visual Analytics Specialist</title>
    <link rel="stylesheet" href="styles_profile.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main class="container">
      <section class="profile-card" aria-labelledby="profile-name">
        <img
          src="https://picsum.photos/120/120"
          alt="World Images"
          class="avatar"
          width="120"
          height="120"
        />
        <h2 class="name" id="profile-name">Juan J. Ortiz</h2>
        <p class="title">Visual Analytics Specialist</p>
        <p class="bio">
          Visualizing data to inspire action and insight.
        </p>
        <button class="follow-btn" aria-label="Follow Juan J. Ortiz">Follow</button>
      </section>

      <section class="chart-container" aria-labelledby="chart-title">
        <h2 class="chart-title" id="chart-title">My First Barplot</h2>
        <div id="chart" role="img" aria-label="Bar chart showing quarterly data"></div>
        <div class="chart-labels">
          <span>Q1</span>
          <span>Q2</span>
          <span>Q3</span>
          <span>Q4</span>
        </div>
      </section>

      <blockquote class="quote" cite="https://www.brainyquote.com/quotes/steve_jobs_100186">
        <p>"The only way to do great work is to love what you do."</p>
        <cite>— Steve Jobs</cite>
      </blockquote>
    </main>
    <script>
      const data = [120, 200, 80, 260];
      const chart = document.getElementById("chart");
      const colors = ["#ff6b6b", "#4ecdc4", "#45b7d1", "#96ceb4"];

      data.forEach((value, index) => {
        const bar = document.createElement("div");
        bar.className = "bar";
        bar.style.width = `${value}px`;
        bar.style.backgroundColor = colors[index];
        bar.setAttribute("data-value", value);
        bar.setAttribute("aria-label", `Bar ${index + 1} with value ${value}`);
        chart.appendChild(bar);
      });
    </script>
  </body>
</html>
